<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOEIC Vol.5 – LC & RC Vocabulary · 1600 từ</title>
    <meta name="description" content="Ôn tập 1600 từ vựng TOEIC ETS Vol.5 phần Listening và Reading với flashcard, phiên âm IPA, quiz luyện tập" />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Lexend:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080b14;
        --surface: #0f1221;
        --card: #141828;
        --border: #1e2540;
        --border2: #262d4a;
        --accent: #4f8fff;
        --accent2: #ff6b6b;
        --accent3: #43e97b;
        --gold: #ffc947;
        --purple: #a78bfa;
        --text: #dde3f8;
        --muted: #6b77a0;
        --muted2: #8892b8;
        --lc-color: #ff6b6b;
        --rc-color: #4f8fff;
      }
      * { margin:0; padding:0; box-sizing:border-box; }
      html { scroll-behavior:smooth; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Be Vietnam Pro", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        min-height: 100vh;
        overflow-x: hidden;
      }
      .glow-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
        z-index: 0;
        opacity: 0.18;
      }
      .glow-orb.a { width:600px; height:600px; background:#4f8fff; top:-200px; left:-200px; }
      .glow-orb.b { width:500px; height:500px; background:#7c3aed; top:50%; right:-200px; }
      body::after {
        content:"";
        position:fixed;
        inset:0;
        background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events:none;
        z-index:0;
      }
      .app { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:0 16px 80px; }

      /* HEADER */
      header { text-align:center; padding:56px 0 40px; animation:fadeDown 0.7s ease both; }
      .eyebrow {
        display:inline-flex; align-items:center; gap:8px;
        background:linear-gradient(135deg,#4f8fff18,#a78bfa18);
        border:1px solid #4f8fff33;
        color:var(--accent);
        font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
        padding:6px 18px; border-radius:999px; margin-bottom:20px;
      }
      .eyebrow::before { content:"◆"; font-size:8px; }
      h1 { font-family:"Lexend",sans-serif; font-size:clamp(32px,6vw,64px); font-weight:800; letter-spacing:-1px; line-height:1.1; }
      h1 em { font-style:normal; background:linear-gradient(135deg,#4f8fff,#a78bfa); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
      .tagline { margin-top:14px; color:var(--muted2); font-size:16px; }

      /* GLOBAL STATS */
      .global-stats { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:36px; animation:fadeDown 0.7s 0.1s ease both; }
      .gstat { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 24px; text-align:center; min-width:100px; }
      .gstat-n { font-family:"Lexend",sans-serif; font-size:26px; font-weight:800; }
      .gstat-n.blue { color:var(--accent); }
      .gstat-n.gold { color:var(--gold); }
      .gstat-n.green { color:var(--accent3); }
      .gstat-n.red { color:var(--accent2); }
      .gstat-l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

      /* SECTION TOGGLE (LC/RC) */
      .section-toggle { display:flex; justify-content:center; gap:10px; margin-bottom:28px; animation:fadeDown 0.7s 0.12s ease both; }
      .sec-btn {
        padding:14px 32px; border-radius:14px; border:2px solid var(--border2);
        background:var(--card); color:var(--muted); font-family:"Lexend",sans-serif;
        font-size:15px; font-weight:700; cursor:pointer; transition:all 0.25s;
        display:flex; align-items:center; gap:10px;
      }
      .sec-btn:hover { border-color:var(--accent); color:var(--text); }
      .sec-btn.active-lc { background:linear-gradient(135deg,#ff6b6b,#f59e0b); border-color:transparent; color:#fff; }
      .sec-btn.active-rc { background:linear-gradient(135deg,#4f8fff,#7c3aed); border-color:transparent; color:#fff; }
      .sec-btn .sec-icon { font-size:20px; }
      .sec-btn .sec-count { font-size:11px; opacity:0.8; font-weight:400; font-family:"Be Vietnam Pro",sans-serif; }

      /* CONTROLS */
      .controls { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:32px; animation:fadeDown 0.7s 0.15s ease both; }
      .search-wrap { position:relative; flex:1; min-width:240px; max-width:380px; }
      .search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
      input[type="text"] {
        width:100%; background:var(--card); border:1px solid var(--border2); color:var(--text);
        font-family:"Be Vietnam Pro",sans-serif; font-size:14px;
        padding:12px 14px 12px 42px; border-radius:12px; outline:none; transition:border-color 0.2s;
      }
      input[type="text"]:focus { border-color:var(--accent); }
      input[type="text"]::placeholder { color:var(--muted); }
      .btn-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
      .chip {
        background:var(--card); border:1px solid var(--border2); color:var(--muted);
        font-family:"Be Vietnam Pro",sans-serif; font-size:12px; font-weight:600;
        padding:9px 16px; border-radius:999px; cursor:pointer; transition:all 0.18s; white-space:nowrap;
      }
      .chip:hover { border-color:var(--accent); color:var(--accent); }
      .chip.on { background:var(--accent); border-color:var(--accent); color:#fff; }
      .chip.gold-chip.on { background:var(--gold); border-color:var(--gold); color:#000; }
      .quiz-chip { background:linear-gradient(135deg,#4f8fff,#7c3aed); border:none; color:#fff; font-weight:700; }
      .quiz-chip:hover { opacity:0.85; color:#fff; }
      .flash-chip { background:linear-gradient(135deg,#43e97b,#38f9d7); border:none; color:#000; font-weight:700; }
      .flash-chip:hover { opacity:0.85; color:#000; }

      /* TEST TABS */
      .test-tabs { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:28px; animation:fadeDown 0.7s 0.2s ease both; }
      .ttab {
        background:var(--card); border:1px solid var(--border); color:var(--muted);
        font-family:"Lexend",sans-serif; font-size:13px; font-weight:700;
        padding:10px 18px; border-radius:10px; cursor:pointer; transition:all 0.2s;
      }
      .ttab:hover { border-color:var(--border2); color:var(--text); }
      .ttab.on { color:#fff; border-color:transparent; }

      /* TABLE */
      .table-section { animation:fadeUp 0.5s 0.25s ease both; }
      .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
      .section-title { font-family:"Lexend",sans-serif; font-size:22px; font-weight:800; }
      .section-title span { font-size:14px; color:var(--muted); font-weight:400; font-family:"Be Vietnam Pro",sans-serif; margin-left:8px; }
      .showing-info { color:var(--muted); font-size:13px; }
      .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; margin-bottom:20px; }
      table { width:100%; border-collapse:collapse; }
      thead tr { background:linear-gradient(90deg,#161c30,#141828); border-bottom:1px solid var(--border); }
      th { font-family:"Lexend",sans-serif; font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); padding:16px 20px; text-align:left; }
      th:first-child { width:50px; text-align:center; }
      th:last-child { width:60px; text-align:center; }
      tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; animation:rowIn 0.3s ease both; }
      tbody tr:last-child { border-bottom:none; }
      tbody tr:hover { background:#1a2038; }
      td { padding:13px 20px; font-size:14px; vertical-align:middle; }
      td:first-child { text-align:center; color:var(--muted); font-size:11px; font-family:"Lexend",sans-serif; font-weight:700; }
      td:last-child { text-align:center; }
      .word { font-weight:700; font-size:15px; color:#fff; letter-spacing:0.2px; }
      .phonetic { color:var(--purple); font-size:12px; font-style:italic; margin-left:6px; opacity:0.85; }
      .meaning { color:var(--gold); font-weight:500; }
      .speak-btn {
        background:#1a2038; border:1px solid var(--border2); color:var(--text);
        font-size:12px; line-height:1; padding:6px 8px; border-radius:8px;
        cursor:pointer; transition:all 0.18s;
      }
      .speak-btn:hover { border-color:var(--accent); color:var(--accent); }
      .tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; padding:3px 8px; border-radius:6px; border:1px solid; }
      .tag.v { color:#4f8fff; border-color:#4f8fff33; background:#4f8fff0d; }
      .tag.n { color:#43e97b; border-color:#43e97b33; background:#43e97b0d; }
      .tag.adj { color:#ffc947; border-color:#ffc94733; background:#ffc9470d; }
      .tag.adv { color:#ff6b6b; border-color:#ff6b6b33; background:#ff6b6b0d; }
      .tag.ph { color:#a78bfa; border-color:#a78bfa33; background:#a78bfa0d; }
      .star-btn { background:none; border:none; cursor:pointer; font-size:17px; padding:4px 6px; border-radius:6px; transition:transform 0.15s; color:var(--border2); }
      .star-btn:hover { transform:scale(1.3); }
      .star-btn.on { color:var(--gold); }
      .no-results { text-align:center; padding:60px 20px; color:var(--muted); display:none; }
      .no-results span { font-size:36px; display:block; margin-bottom:12px; }

      /* QUIZ OVERLAY */
      #quiz-overlay {
        display:none; position:fixed; inset:0; background:#080b14ee;
        backdrop-filter:blur(12px); z-index:200; align-items:center; justify-content:center;
        animation:fadeIn 0.3s ease;
      }
      #quiz-overlay.show { display:flex; }
      .qcard {
        background:var(--card); border:1px solid var(--border2); border-radius:28px;
        padding:48px 40px; max-width:520px; width:92%; text-align:center;
        box-shadow:0 40px 120px #00000090; animation:scaleIn 0.35s ease;
      }
      .qprogress { font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:14px; }
      .qbar { height:4px; background:var(--border); border-radius:99px; margin-bottom:28px; overflow:hidden; }
      .qbar-fill { height:100%; background:linear-gradient(90deg,#4f8fff,#a78bfa); border-radius:99px; transition:width 0.4s ease; }
      .qword { font-family:"Lexend",sans-serif; font-size:clamp(28px,5vw,42px); font-weight:800; color:#fff; margin-bottom:6px; word-break:break-word; }
      .qhint { font-size:13px; color:var(--muted); margin-bottom:28px; }
      .qopts { display:grid; gap:10px; }
      .qopt {
        background:#1a2038; border:1px solid var(--border2); color:var(--text);
        font-family:"Be Vietnam Pro",sans-serif; font-size:14px; font-weight:500;
        padding:14px 18px; border-radius:12px; cursor:pointer; transition:all 0.18s; text-align:left;
      }
      .qopt:hover { background:#202840; border-color:var(--accent); }
      .qopt.correct { background:#43e97b15; border-color:var(--accent3); color:var(--accent3); }
      .qopt.wrong { background:#ff6b6b15; border-color:var(--accent2); color:var(--accent2); }
      .result-score { font-family:"Lexend",sans-serif; font-size:72px; font-weight:800; color:var(--accent3); margin:10px 0; }
      .qbtn-row { display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
      .qbtn {
        background:var(--border); border:none; color:var(--muted2);
        font-family:"Be Vietnam Pro",sans-serif; font-size:14px; font-weight:600;
        padding:13px 26px; border-radius:12px; cursor:pointer; transition:all 0.18s;
      }
      .qbtn:hover { background:var(--accent); color:#fff; }
      .qbtn.primary { background:linear-gradient(135deg,#4f8fff,#7c3aed); color:#fff; }

      /* FLASHCARD OVERLAY */
      #flash-overlay {
        display:none; position:fixed; inset:0; background:#080b14ee;
        backdrop-filter:blur(12px); z-index:200; align-items:center; justify-content:center;
        animation:fadeIn 0.3s ease; flex-direction:column; gap:20px;
      }
      #flash-overlay.show { display:flex; }
      .flash-progress { color:var(--muted); font-size:13px; letter-spacing:1px; }
      .flashcard-container { perspective:800px; width:92%; max-width:480px; height:320px; cursor:pointer; }
      .flashcard {
        position:relative; width:100%; height:100%; transition:transform 0.6s;
        transform-style:preserve-3d;
      }
      .flashcard.flipped { transform:rotateY(180deg); }
      .flash-face {
        position:absolute; inset:0; backface-visibility:hidden;
        border-radius:28px; display:flex; flex-direction:column;
        align-items:center; justify-content:center; padding:40px;
        border:1px solid var(--border2); box-shadow:0 40px 120px #00000090;
      }
      .flash-front {
        background:linear-gradient(145deg,#141828,#1a2040);
      }
      .flash-back {
        background:linear-gradient(145deg,#1a1830,#201840);
        transform:rotateY(180deg);
      }
      .flash-word { font-family:"Lexend",sans-serif; font-size:clamp(28px,6vw,48px); font-weight:800; color:#fff; margin-bottom:8px; }
      .flash-ipa { color:var(--purple); font-size:16px; margin-bottom:12px; }
      .flash-type { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
      .flash-meaning { font-size:24px; font-weight:600; color:var(--gold); margin-bottom:12px; }
      .flash-test-info { font-size:12px; color:var(--muted); }
      .flash-hint { color:var(--muted); font-size:12px; margin-top:8px; }
      .flash-controls { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
      .flash-btn {
        background:var(--card); border:1px solid var(--border2); color:var(--text);
        font-family:"Be Vietnam Pro",sans-serif; font-size:14px; font-weight:600;
        padding:12px 24px; border-radius:12px; cursor:pointer; transition:all 0.18s;
      }
      .flash-btn:hover { border-color:var(--accent); color:var(--accent); }
      .flash-btn.primary { background:linear-gradient(135deg,#43e97b,#38f9d7); border:none; color:#000; }
      .flash-btn.danger { background:linear-gradient(135deg,#ff6b6b,#f59e0b); border:none; color:#fff; }

      /* ANIMATIONS */
      @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:none; } }
      @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      @keyframes scaleIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
      @keyframes rowIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:none; } }

      /* RESPONSIVE */
      @media (max-width:600px) {
        th:nth-child(4), td:nth-child(4) { display:none; }
        .qcard { padding:32px 24px; }
        .flashcard-container { height:260px; }
        .flash-word { font-size:28px; }
        .sec-btn { padding:10px 20px; font-size:13px; }
      }
    </style>
  </head>
  <body>
    <div class="glow-orb a"></div>
    <div class="glow-orb b"></div>

    <div class="app">
      <header>
        <div class="eyebrow">ETS TOEIC Vol. 5 · LC & RC</div>
        <h1>1600 từ vựng<br /><em>Listening & Reading</em></h1>
        <p class="tagline">Phần nghe · Phần đọc · Flashcard · Phiên âm · Quiz</p>
      </header>

      <!-- GLOBAL STATS -->
      <div class="global-stats">
        <div class="gstat"><div class="gstat-n blue" id="g-total">1600</div><div class="gstat-l">Tổng từ</div></div>
        <div class="gstat"><div class="gstat-n red" id="g-lc">800</div><div class="gstat-l">LC · Nghe</div></div>
        <div class="gstat"><div class="gstat-n blue" id="g-rc">800</div><div class="gstat-l">RC · Đọc</div></div>
        <div class="gstat"><div class="gstat-n gold" id="g-starred">0</div><div class="gstat-l">Đã đánh dấu</div></div>
        <div class="gstat"><div class="gstat-n green" id="g-showing">1600</div><div class="gstat-l">Đang hiển thị</div></div>
      </div>

      <!-- LC / RC TOGGLE -->
      <div class="section-toggle">
        <button class="sec-btn active-lc" id="btn-lc" onclick="setSection('lc')">
          <span class="sec-icon">🎧</span>
          <div><strong>LISTENING</strong><br><span class="sec-count">800 từ · Phần nghe</span></div>
        </button>
        <button class="sec-btn" id="btn-rc" onclick="setSection('rc')">
          <span class="sec-icon">📖</span>
          <div><strong>READING</strong><br><span class="sec-count">800 từ · Phần đọc</span></div>
        </button>
        <button class="sec-btn" id="btn-all" onclick="setSection('all')">
          <span class="sec-icon">📚</span>
          <div><strong>TẤT CẢ</strong><br><span class="sec-count">1600 từ</span></div>
        </button>
      </div>

      <!-- CONTROLS -->
      <div class="controls">
        <div class="search-wrap">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="search" placeholder="Tìm từ tiếng Anh hoặc nghĩa tiếng Việt…" />
        </div>
        <div class="btn-row" id="type-chips">
          <button class="chip on" data-type="all" onclick="setType('all',this)">Tất cả</button>
          <button class="chip" data-type="v" onclick="setType('v',this)">Động từ</button>
          <button class="chip" data-type="n" onclick="setType('n',this)">Danh từ</button>
          <button class="chip" data-type="adj" onclick="setType('adj',this)">Tính từ</button>
          <button class="chip" data-type="adv" onclick="setType('adv',this)">Trạng từ</button>
          <button class="chip" data-type="ph" onclick="setType('ph',this)">Cụm từ</button>
          <button class="chip gold-chip" data-type="starred" onclick="setType('starred',this)">⭐ Đã đánh dấu</button>
        </div>
        <div class="btn-row">
          <button class="chip quiz-chip" onclick="startQuiz()">🎯 Quiz luyện tập</button>
          <button class="chip flash-chip" onclick="startFlashcard()">🃏 Flashcard ôn tập</button>
        </div>
      </div>

      <!-- TEST TABS -->
      <div class="test-tabs" id="test-tabs">
        <button class="ttab on" data-test="0" onclick="setTest(0,this)" style="background:linear-gradient(135deg,#4f8fff,#7c3aed)">Tất cả</button>
      </div>

      <!-- TABLE -->
      <div class="table-section">
        <div class="section-header">
          <div class="section-title" id="sec-title">Tất cả <span id="sec-sub">10 Tests · 1600 từ</span></div>
          <div class="showing-info" id="showing-info">Hiển thị 1600 từ</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th>
              <th>Từ vựng</th>
              <th>Nghĩa tiếng Việt</th>
              <th>Loại từ</th>
              <th>⭐</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
          <div class="no-results" id="no-results"><span>🔍</span>Không tìm thấy từ nào phù hợp</div>
        </div>
      </div>
    </div>

    <!-- QUIZ -->
    <div id="quiz-overlay"><div class="qcard" id="qcard"></div></div>

    <!-- FLASHCARD -->
    <div id="flash-overlay">
      <div class="flash-progress" id="flash-progress"></div>
      <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="flashcard">
          <div class="flash-face flash-front" id="flash-front"></div>
          <div class="flash-face flash-back" id="flash-back"></div>
        </div>
      </div>
      <div class="flash-controls">
        <button class="flash-btn danger" onclick="flashMark('hard')">😓 Khó</button>
        <button class="flash-btn" onclick="flashMark('ok')">🤔 Tạm ổn</button>
        <button class="flash-btn primary" onclick="flashMark('easy')">✅ Dễ</button>
      </div>
      <div class="flash-controls" style="margin-top:-8px">
        <button class="flash-btn" onclick="closeFlash()" style="font-size:12px;padding:8px 18px">✕ Đóng</button>
      </div>
    </div>

    <script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════
const LC_TESTS = [
  // TEST 01
  [
    {w:"carry",m:"mang, mang theo",t:"v"},
    {w:"remove",m:"cởi ra, tháo ra",t:"v"},
    {w:"pour",m:"rót, đổ",t:"v"},
    {w:"beverage",m:"đồ uống",t:"n"},
    {w:"light fixture",m:"thiết bị chiếu sáng",t:"ph"},

function getPool() {
  if(state.section==='lc') return LC_ALL;
  if(state.section==='rc') return RC_ALL;
  return ALL;
}

function getFiltered(){
  const q = state.q.toLowerCase();
  const pool = getPool();
  return pool.filter(item => {
    if(state.test!==0 && item.test!==state.test) return false;
    if(state.type==='starred') return state.starred.has(item.section+'-'+item.test+'-'+item.idx);
    if(state.type!=='all' && item.t!==state.type) return false;
    if(q) return item.w.toLowerCase().includes(q) || item.m.toLowerCase().includes(q);
    return true;
  });
}

const TYPE_LABELS = {v:'Động từ', n:'Danh từ', adj:'Tính từ', adv:'Trạng từ', ph:'Cụm từ'};

function playPron(encodedWord){
  const word = decodeURIComponent(encodedWord);
  if(!('speechSynthesis' in window)){alert('Trình duyệt chưa hỗ trợ phát âm.');return;}
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.92; u.pitch=1;
  window.speechSynthesis.speak(u);
}

  return '';
}

function render(){
  const data = getFiltered();
  const tbody = document.getElementById('tbody');
  const nr = document.getElementById('no-results');
  document.getElementById('g-showing').textContent = data.length;
  document.getElementById('g-starred').textContent = state.starred.size;

  if(!data.length){ tbody.innerHTML=''; nr.style.display='block'; return; }
  nr.style.display='none';

  tbody.innerHTML = data.map((item,i) => {
    const key = item.section+'-'+item.test+'-'+item.idx;
    const isS = state.starred.has(key);
    const secLabel = item.section==='lc' ? '🎧LC' : '📖RC';
    return `<tr style="animation-delay:${Math.min(i*8,300)}ms">
      <td>${i+1}</td>
      <td>
        <span class="word">${item.w}</span>
        <button class="speak-btn" onclick="playPron('${encodeURIComponent(item.w)}')" title="Phát âm">🔊</button>
        <br><small style="color:var(--muted);font-size:11px">${secLabel} · Test ${item.test} · #${item.idx+1}</small>
      </td>
      <td><span class="meaning">${item.m}</span></td>
      <td><span class="tag ${item.t}">${TYPE_LABELS[item.t]||item.t}</span></td>
      <td><button class="star-btn ${isS?'on':''}" onclick="toggleStar('${key}',this)">${isS?'⭐':'☆'}</button></td>
    </tr>`;
  }).join('');
}

function updateTitle(){
  const t = state.test;
  const secName = state.section==='lc'?'🎧 LISTENING':state.section==='rc'?'📖 READING':'📚 Tất cả';
  const total = state.section==='all' ? 1600 : 800;
  const perTest = state.section==='all' ? 160 : 80;
  document.getElementById('sec-title').innerHTML = t===0
    ? secName+' <span id="sec-sub">10 Tests · '+total+' từ</span>'
    : secName+' · TEST '+String(t).padStart(2,'0')+' <span id="sec-sub">'+perTest+' từ</span>';
}

function toggleStar(key,btn){
  if(state.starred.has(key)){ state.starred.delete(key); btn.classList.remove('on'); btn.textContent='☆'; }
  else { state.starred.add(key); btn.classList.add('on'); btn.textContent='⭐'; }
  document.getElementById('g-starred').textContent = state.starred.size;
  if(state.type==='starred') render();
}

let Q = {data:[],idx:0,score:0,done:false};

function startQuiz(){
  const pool = getFiltered();
  if(pool.length<4){alert('Cần ít nhất 4 từ!');return;}
  Q.data = shuffle([...pool]).slice(0,Math.min(20,pool.length));
  Q.idx=0; Q.score=0; Q.done=false;
  document.getElementById('quiz-overlay').classList.add('show');
  showQ();
}

function showQ(){
  if(Q.idx>=Q.data.length){showResult();return;}
  const item = Q.data[Q.idx];
  const currentPool = getPool();
  const wrongs = shuffle(currentPool.filter(v=>v.w!==item.w)).slice(0,3);
  const opts = shuffle([item,...wrongs]);
  const pct = Math.round(Q.idx/Q.data.length*100);
  document.getElementById('qcard').innerHTML = `
    <div class="qprogress">Câu ${Q.idx+1} / ${Q.data.length} · ✅ ${Q.score}</div>
    <div class="qbar"><div class="qbar-fill" style="width:${pct}%"></div></div>
    <div class="qword">${item.w}</div>
    <div class="qhint">${item.section==='lc'?'🎧 LC':'📖 RC'} · Test ${item.test} · Chọn nghĩa đúng</div>
    <div class="qopts">${opts.map(o => `<button class="qopt" onclick="answer(this,'${o.w.replace(/'/g,"\\'")}','${item.w.replace(/'/g,"\\'")}')">${o.m}</button>`).join('')}</div>`;
}

function answer(btn,chosen,correct){
  if(Q.done)return;
  Q.done=true;
  const pool = getPool();
  document.querySelectorAll('.qopt').forEach(b => {
    const word = pool.find(v=>v.m===b.textContent);
    if(word && word.w===correct) b.classList.add('correct');
  });
  if(chosen===correct){btn.classList.add('correct');Q.score++;}
  else btn.classList.add('wrong');
  setTimeout(()=>{Q.idx++;Q.done=false;showQ();},900);
}

function showResult(){
  const pct = Math.round(Q.score/Q.data.length*100);
  const e = pct>=80?'🎉':pct>=60?'💪':'📚';
  const msg = pct>=80?'Xuất sắc!':pct>=60?'Tốt lắm!':'Cần ôn thêm!';
  document.getElementById('qcard').innerHTML = `
    <div style="font-size:52px">${e}</div>
    <div style="font-family:'Lexend',sans-serif;font-size:22px;font-weight:800;margin:12px 0 4px">${msg}</div>
    <div class="result-score">${Q.score}/${Q.data.length}</div>
    <div style="color:var(--muted);margin-bottom:24px">${pct}% chính xác</div>
    <div class="qbtn-row">
      <button class="qbtn primary" onclick="startQuiz()">🔁 Chơi lại</button>
      <button class="qbtn" onclick="closeQuiz()">✕ Đóng</button>
    </div>`;
}

function closeQuiz(){document.getElementById('quiz-overlay').classList.remove('show');}
document.getElementById('quiz-overlay').addEventListener('click',e=>{if(e.target.id==='quiz-overlay')closeQuiz();});

// ═══════════════════════════════════════════════
//  FLASHCARD
// ═══════════════════════════════════════════════
let FC = {data:[],idx:0,hard:[],ok:[],easy:[]};

function startFlashcard(){
  const pool = getFiltered();
  if(pool.length<1){alert('Không có từ nào để ôn!');return;}
  FC.data = shuffle([...pool]).slice(0,Math.min(30,pool.length));
  FC.idx=0; FC.hard=[]; FC.ok=[]; FC.easy=[];
  document.getElementById('flash-overlay').classList.add('show');
  showFlash();
}

function showFlash(){
  if(FC.idx>=FC.data.length){showFlashResult();return;}
  const item = FC.data[FC.idx];
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');
  const secLabel = item.section==='lc'?'🎧 Listening':'📖 Reading';
  document.getElementById('flash-progress').textContent =
    'Thẻ '+(FC.idx+1)+' / '+FC.data.length+' · 😓'+FC.hard.length+' 🤔'+FC.ok.length+' ✅'+FC.easy.length;
  document.getElementById('flash-front').innerHTML = `
    <div class="flash-word">${item.w}</div>
    <div class="flash-type">${TYPE_LABELS[item.t]||item.t} · ${secLabel} · Test ${item.test}</div>
    <div class="flash-hint">Nhấn để lật thẻ</div>`;
  document.getElementById('flash-back').innerHTML = `
    <div class="flash-meaning">${item.m}</div>
    <div class="flash-word" style="font-size:22px;color:var(--text);margin-bottom:4px">${item.w}</div>
    <div class="flash-test-info">${TYPE_LABELS[item.t]||item.t} · ${secLabel} · Test ${item.test} · #${item.idx+1}</div>`;
}

function flipCard(){
  document.getElementById('flashcard').classList.toggle('flipped');
}

function flashMark(level){
  const item = FC.data[FC.idx];
  if(level==='hard') FC.hard.push(item);
  else if(level==='ok') FC.ok.push(item);
  else FC.easy.push(item);
  FC.idx++;
  showFlash();
}

function showFlashResult(){
  const total = FC.hard.length+FC.ok.length+FC.easy.length;
  const pct = Math.round(FC.easy.length/total*100);
  document.getElementById('flash-progress').textContent = 'Hoàn tất!';
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('flash-front').innerHTML = `
    <div style="font-size:48px;margin-bottom:16px">${pct>=70?'🎉':'📚'}</div>
    <div style="font-family:'Lexend',sans-serif;font-size:22px;font-weight:800;margin-bottom:16px">${pct>=70?'Tuyệt vời!':'Cần ôn thêm!'}</div>
    <div style="display:flex;gap:24px;font-size:18px;font-weight:700">
      <div>😓 <span style="color:var(--accent2)">${FC.hard.length}</span></div>
      <div>🤔 <span style="color:var(--gold)">${FC.ok.length}</span></div>
      <div>✅ <span style="color:var(--accent3)">${FC.easy.length}</span></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      ${FC.hard.length>0?'<button class="flash-btn danger" onclick="reviewHard()">Ôn lại từ khó</button>':''}
      <button class="flash-btn primary" onclick="startFlashcard()">🔁 Ôn lại</button>
      <button class="flash-btn" onclick="closeFlash()">✕ Đóng</button>
    </div>`;
  document.getElementById('flash-back').innerHTML = '';
}

function reviewHard(){
  FC.data = shuffle([...FC.hard]);
  FC.idx=0; FC.hard=[]; FC.ok=[]; FC.easy=[];
  showFlash();
}

function closeFlash(){document.getElementById('flash-overlay').classList.remove('show');}
document.getElementById('flash-overlay').addEventListener('click',e=>{if(e.target.id==='flash-overlay')closeFlash();});

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildTabs();
render();
    </script>
  </body>
