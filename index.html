<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Vol.5 – 10 Tests Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b14;
  --surface: #0f1221;
  --card: #141828;
  --border: #1e2540;
  --border2: #262d4a;
  --accent: #4f8fff;
  --accent2: #ff6b6b;
  --accent3: #43e97b;
  --gold: #ffc947;
  --purple: #a78bfa;
  --text: #dde3f8;
  --muted: #6b77a0;
  --muted2: #8892b8;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* Ambient glow */
.glow-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;opacity:0.18}
.glow-orb.a{width:600px;height:600px;background:#4f8fff;top:-200px;left:-200px}
.glow-orb.b{width:500px;height:500px;background:#7c3aed;top:50%;right:-200px}

/* Noise overlay */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 16px 80px}

/* ── HEADER ── */
header{text-align:center;padding:56px 0 40px;animation:fadeDown .7s ease both}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#4f8fff18,#a78bfa18);border:1px solid #4f8fff33;color:var(--accent);font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:6px 18px;border-radius:999px;margin-bottom:20px}
.eyebrow::before{content:'◆';font-size:8px}
h1{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,64px);font-weight:800;letter-spacing:-2px;line-height:1.05}
h1 em{font-style:normal;background:linear-gradient(135deg,#4f8fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{margin-top:14px;color:var(--muted2);font-size:16px}

/* ── GLOBAL STATS ── */
.global-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;animation:fadeDown .7s .1s ease both}
.gstat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 24px;text-align:center;min-width:100px}
.gstat-n{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.gstat-n.blue{color:var(--accent)}
.gstat-n.gold{color:var(--gold)}
.gstat-n.green{color:var(--accent3)}
.gstat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ── CONTROLS BAR ── */
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:32px;animation:fadeDown .7s .15s ease both}
.search-wrap{position:relative;flex:1;min-width:240px;max-width:380px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
input[type=text]{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 14px 12px 42px;border-radius:12px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}

.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.chip{background:var(--card);border:1px solid var(--border2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:9px 16px;border-radius:999px;cursor:pointer;transition:all .18s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.gold-chip.on{background:var(--gold);border-color:var(--gold);color:#000}
.quiz-chip{background:linear-gradient(135deg,#4f8fff,#7c3aed);border:none;color:#fff;font-weight:700}
.quiz-chip:hover{opacity:.85;color:#fff}

/* ── TEST TABS ── */
.test-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;animation:fadeDown .7s .2s ease both}
.ttab{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:10px 18px;border-radius:10px;cursor:pointer;transition:all .2s}
.ttab:hover{border-color:var(--border2);color:var(--text)}
.ttab.on{color:#fff;border-color:transparent}

/* ── TABLE SECTION ── */
.table-section{animation:fadeUp .5s .25s ease both}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.section-title span{font-size:14px;color:var(--muted);font-weight:400;font-family:'DM Sans',sans-serif;margin-left:8px}
.showing-info{color:var(--muted);font-size:13px}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
thead tr{background:linear-gradient(90deg,#161c30,#141828);border-bottom:1px solid var(--border)}
th{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:16px 20px;text-align:left}
th:first-child{width:50px;text-align:center}
th:last-child{width:60px;text-align:center}

tbody tr{border-bottom:1px solid var(--border);transition:background .15s;animation:rowIn .3s ease both}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#1a2038}

td{padding:13px 20px;font-size:14px;vertical-align:middle}
td:first-child{text-align:center;color:var(--muted);font-size:11px;font-family:'Syne',sans-serif;font-weight:700}
td:last-child{text-align:center}

.word{font-weight:700;font-size:15px;color:#fff;letter-spacing:.2px}
.meaning{color:var(--gold);font-weight:500}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:6px;border:1px solid}
.tag.v{color:#4f8fff;border-color:#4f8fff33;background:#4f8fff0d}
.tag.n{color:#43e97b;border-color:#43e97b33;background:#43e97b0d}
.tag.adj{color:#ffc947;border-color:#ffc94733;background:#ffc9470d}
.tag.adv{color:#ff6b6b;border-color:#ff6b6b33;background:#ff6b6b0d}
.tag.ph{color:#a78bfa;border-color:#a78bfa33;background:#a78bfa0d}

.star-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:4px 6px;border-radius:6px;transition:transform .15s;color:var(--border2)}
.star-btn:hover{transform:scale(1.3);background:none}
.star-btn.on{color:var(--gold)}

.no-results{text-align:center;padding:60px 20px;color:var(--muted);display:none}
.no-results span{font-size:36px;display:block;margin-bottom:12px}

/* ── QUIZ OVERLAY ── */
#quiz-overlay{display:none;position:fixed;inset:0;background:#080b14ee;backdrop-filter:blur(12px);z-index:200;align-items:center;justify-content:center;animation:fadeIn .3s ease}
#quiz-overlay.show{display:flex}
.qcard{background:var(--card);border:1px solid var(--border2);border-radius:28px;padding:48px 40px;max-width:520px;width:92%;text-align:center;box-shadow:0 40px 120px #00000090;animation:scaleIn .35s ease}
.qprogress{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.qbar{height:4px;background:var(--border);border-radius:99px;margin-bottom:28px;overflow:hidden}
.qbar-fill{height:100%;background:linear-gradient(90deg,#4f8fff,#a78bfa);border-radius:99px;transition:width .4s ease}
.qword{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,42px);font-weight:800;color:#fff;margin-bottom:6px;word-break:break-word}
.qhint{font-size:13px;color:var(--muted);margin-bottom:28px}
.qopts{display:grid;gap:10px}
.qopt{background:#1a2038;border:1px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:14px 18px;border-radius:12px;cursor:pointer;transition:all .18s;text-align:left}
.qopt:hover{background:#202840;border-color:var(--accent)}
.qopt.correct{background:#43e97b15;border-color:var(--accent3);color:var(--accent3)}
.qopt.wrong{background:#ff6b6b15;border-color:var(--accent2);color:var(--accent2)}
.result-score{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;color:var(--accent3);margin:10px 0}
.qbtn-row{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.qbtn{background:var(--border);border:none;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:13px 26px;border-radius:12px;cursor:pointer;transition:all .18s}
.qbtn:hover{background:var(--accent);color:#fff}
.qbtn.primary{background:linear-gradient(135deg,#4f8fff,#7c3aed);color:#fff}

/* ── ANIMATIONS ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  th:nth-child(4),td:nth-child(4){display:none}
  .qcard{padding:32px 24px}
}
</style>
</head>

<!-- TABLE -->

  <div class="table-wrap">

    </table>
    <div class="no-results" id="no-results"><span>🔍</span>Không tìm thấy từ nào phù hợp</div>
  </div>
</div>

</div>

<!-- QUIZ -->
<div id="quiz-overlay">

</div>

// Flatten with test index
const ALL = [];
TESTS.forEach((test, ti) => test.forEach((w, wi) => ALL.push({...w, test: ti+1, idx: wi})));

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let state = { type:'all', test:0, q:'', starred: new Set() };

// ═══════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════
const COLORS = [
  'linear-gradient(135deg,#4f8fff,#7c3aed)',
  'linear-gradient(135deg,#ff6b6b,#f59e0b)',
  'linear-gradient(135deg,#43e97b,#38f9d7)',
  'linear-gradient(135deg,#fa8231,#f53b57)',
  'linear-gradient(135deg,#a78bfa,#ec4899)',
  'linear-gradient(135deg,#00b4d8,#0077b6)',
  'linear-gradient(135deg,#f7971e,#ffd200)',
  'linear-gradient(135deg,#11998e,#38ef7d)',
  'linear-gradient(135deg,#ee0979,#ff6a00)',
  'linear-gradient(135deg,#8e2de2,#4a00e0)',
];

function buildTabs() {
  const wrap = document.getElementById('test-tabs');
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'ttab';
    btn.dataset.test = i;
    btn.textContent = `Test ${i}`;
    btn.onclick = function(){ setTest(i, this); };
    wrap.appendChild(btn);
  }
}

function setTest(t, el) {
  state.test = t;
  document.querySelectorAll('.ttab').forEach(b => {
    b.classList.remove('on');
    b.style.background = '';
  });
  el.classList.add('on');
  if (t === 0) el.style.background = COLORS[0];
  else el.style.background = COLORS[(t-1) % COLORS.length];
  updateTitle();
  render();
}

// ═══════════════════════════════════════════════
//  TYPE FILTER
// ═══════════════════════════════════════════════
function setType(tp, el) {
  state.type = tp;
  document.querySelectorAll('#type-chips .chip').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  render();
}

// ═══════════════════════════════════════════════
//  FILTER + RENDER
// ═══════════════════════════════════════════════
function getFiltered() {
  const q = state.q.toLowerCase();
  return ALL.filter(item => {
    if (state.test !== 0 && item.test !== state.test) return false;
    if (state.type === 'starred') return state.starred.has(item.test + '-' + item.idx);
    if (state.type !== 'all' && item.t !== state.type) return false;
    if (q) return item.w.toLowerCase().includes(q) || item.m.toLowerCase().includes(q);
    return true;
  });
}

const TYPE_LABELS = {v:'Động từ',n:'Danh từ',adj:'Tính từ',adv:'Trạng từ',ph:'Cụm từ'};

function render() {
  const data = getFiltered();
  const tbody = document.getElementById('tbody');
  const nr = document.getElementById('no-results');
  document.getElementById('g-showing').textContent = data.length;

  if (!data.length) { tbody.innerHTML = ''; nr.style.display = 'block'; return; }
  nr.style.display = 'none';

  tbody.innerHTML = data.map((item, i) => {
    const key = item.test + '-' + item.idx;
    const isS = state.starred.has(key);
    return `<tr style="animation-delay:${Math.min(i*8,300)}ms">
      <td>${i + 1}</td>
      <td><span class="word">${item.w}</span><br><small style="color:var(--muted);font-size:11px">Test ${item.test} · #${item.idx+1}</small></td>
      <td><span class="meaning">${item.m}</span></td>
      <td><span class="tag ${item.t}">${TYPE_LABELS[item.t]||item.t}</span></td>
      <td><button class="star-btn ${isS?'on':''}" onclick="toggleStar('${key}',this)">${isS?'⭐':'☆'}</button></td>
    </tr>`;
  }).join('');
}

function updateTitle() {
  const t = state.test;
  document.getElementById('sec-title').innerHTML = t === 0
    ? `Tất cả <span id="sec-sub">10 Tests · 800 từ</span>`
    : `TEST 0${t < 10 ? '' : ''}${t} <span id="sec-sub">80 từ vựng</span>`;
}

document.getElementById('search').addEventListener('input', e => { state.q = e.target.value; render(); });

// ═══════════════════════════════════════════════
//  STAR
// ═══════════════════════════════════════════════
function toggleStar(key, btn) {
  if (state.starred.has(key)) { state.starred.delete(key); btn.classList.remove('on'); btn.textContent = '☆'; }
  else { state.starred.add(key); btn.classList.add('on'); btn.textContent = '⭐'; }
  document.getElementById('g-starred').textContent = state.starred.size;
  if (state.type === 'starred') render();
}

// ═══════════════════════════════════════════════
//  QUIZ
// ═══════════════════════════════════════════════
let Q = { data:[], idx:0, score:0, done:false };

function startQuiz() {
  const pool = getFiltered();
  if (pool.length < 4) { alert('Cần ít nhất 4 từ để bắt đầu quiz!'); return; }
  Q.data = shuffle([...pool]).slice(0, Math.min(20, pool.length));
  Q.idx = 0; Q.score = 0; Q.done = false;
  document.getElementById('quiz-overlay').classList.add('show');
  showQ();
}

function showQ() {
  if (Q.idx >= Q.data.length) { showResult(); return; }
  const item = Q.data[Q.idx];
  const wrongs = shuffle(ALL.filter(v => v.w !== item.w)).slice(0, 3);
  const opts = shuffle([item, ...wrongs]);
  const pct = Math.round(Q.idx / Q.data.length * 100);
  document.getElementById('qcard').innerHTML = `
    <div class="qprogress">Câu ${Q.idx+1} / ${Q.data.length} · ✅ ${Q.score}</div>
    <div class="qbar"><div class="qbar-fill" style="width:${pct}%"></div></div>
    <div class="qword">${item.w}</div>
    <div class="qhint">Test ${item.test} · Chọn nghĩa đúng</div>
    <div class="qopts">
      ${opts.map(o=>`<button class="qopt" onclick="answer(this,'${o.w}','${item.w}')">${o.m}</button>`).join('')}
    </div>`;
}

function answer(btn, chosen, correct) {
  if (Q.done) return; Q.done = true;
  document.querySelectorAll('.qopt').forEach(b => {
    const word = ALL.find(v => v.m === b.textContent);
    if (word && word.w === correct) b.classList.add('correct');
  });
  if (chosen === correct) { btn.classList.add('correct'); Q.score++; }
  else btn.classList.add('wrong');
  setTimeout(() => { Q.idx++; Q.done = false; showQ(); }, 900);
}

function showResult() {
  const pct = Math.round(Q.score / Q.data.length * 100);
  const e = pct >= 80 ? '🎉' : pct >= 60 ? '💪' : '📚';
  const msg = pct >= 80 ? 'Xuất sắc!' : pct >= 60 ? 'Tốt lắm!' : 'Cần ôn thêm!';
  document.getElementById('qcard').innerHTML = `
    <div style="font-size:52px">${e}</div>
    <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin:12px 0 4px">${msg}</div>
    <div class="result-score">${Q.score}/${Q.data.length}</div>
    <div style="color:var(--muted);margin-bottom:24px">${pct}% chính xác</div>
    <div class="qbtn-row">
      <button class="qbtn primary" onclick="startQuiz()">🔁 Chơi lại</button>
      <button class="qbtn" onclick="closeQuiz()">✕ Đóng</button>
    </div>`;
}

function closeQuiz() { document.getElementById('quiz-overlay').classList.remove('show'); }
document.getElementById('quiz-overlay').addEventListener('click', e => { if (e.target.id==='quiz-overlay') closeQuiz(); });

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildTabs();
render();
</script>
